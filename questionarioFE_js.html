<script>

  "use strict";



  /**
   * chama a função backend para salvar o questionário
   */       
  function salvarQuestionarioFE( respostasQuestionario ) {

    console.log( "salvarQuestionarioFE_js - INÍCIO" );

    //let questionario_status = document.getElementById( "questionario_status" );
    // mostra modal com mensagem de gravação das respostas do questionário
    mostrarModalMensagem( "Salvando questionário, por favor aguarde..." );


    const jsonRespostasQuestionario = JSON.stringify( respostasQuestionario );

    // Chama a função back end para salvar o questionário
    google.script.run
                 .withSuccessHandler( () => {

                  // Atualiza o caso também no frontend, para não precisar 
                  // carregá-lo do backend novamente

                   cache_CasoEmVisualizacao.id_situacao_questionario = "3"; 

                   cache_CasoEmVisualizacao.ids_respostas_questionarios = {      
                     "q1" : respostasQuestionario.q1,
                     "q2" : respostasQuestionario.q2,
                     "q3" : respostasQuestionario.q3,
                     "q4" : respostasQuestionario.q4,
                     "q5" : respostasQuestionario.q5,
                     "observacoes" : respostasQuestionario.observacoes
                   };                       


                   // Visualiza novo status do questionário
                   visualizarSituacaoQuestionario( cache_CasoEmVisualizacao );

                   // Esconde modal de mensagem
                   modalMensagem.hide();      
                   window.scrollTo(0, 0);                
  
                 })
                 .withFailureHandler( erro => {
  
                   // Visualiza novo status do questionário
                   visualizarSituacaoQuestionario( cache_CasoEmVisualizacao );

                   // Esconde modal de mensagem
                   modalMensagem.hide();                      

                   // Exibe modal de erro ao gravar o questionário
                   mostrarModalErro( "salvarQuestionarioFE - " + erro.message );                            
                   console.log( erro.message );
  
                 })
                 // Chama a função backend que designa o caso
                 .salvarQuestionarioBE( jsonRespostasQuestionario );     
                 

    console.log( "salvarQuestionarioFE_js - FIM" );

  } // Fim da função salvarQuestionarioFE



  /**
   * Função que mostra a situação do questionário
   */      
  function visualizarSituacaoQuestionario( caso ) {

    // Obtém o elemento questionario_status
    let questionarioStatus = document.getElementById("questionario_status");   
        
    // Exibe a situação do questionário
    switch( caso.id_situacao_questionario ) {

      case "1": // Sem questionário a responder
        questionarioStatus.innerHTML = "Sem questionário a responder";
        questionarioStatus.style.color = "blue";
        document.getElementById("btResponserQuestionario").style.display  =  "none"; 
        document.getElementById("questionario_conteudo").style.display    =  "none";             
        break;
      case "2": // Questionário Pendente
        questionarioStatus.innerHTML = "Questionário Pendente";
        questionarioStatus.style.color = "red";
        document.getElementById("btResponserQuestionario").style.display  =  "";   
        document.getElementById("questionario_conteudo").style.display    =  "none";                     
        break;
      case "3": // Questionário Respondido
        questionarioStatus.innerHTML = "Questionário Respondido";
        questionarioStatus.style.color = "green";
        document.getElementById("btResponserQuestionario").style.display  =  "none";         
        document.getElementById("btSalvarQuestionario").style.display     =  "none";                 
        document.getElementById("questionario_conteudo").style.display    =  "";                     
        visualizarQuestionarioRespondido( caso );        
        break;
      default:
        questionarioStatus.innerHTML = "";
        document.getElementById("btResponserQuestionario").style.display  =  "none";         
        document.getElementById("btSalvarQuestionario").style.display     =  "none";                 
        document.getElementById("questionario_conteudo").style.display    =  "none";                             
    }

  } // Fim da função visualizarSituacaoQuestionario



  /**
   * Função que mostra o questionário respondido
   */
  function visualizarQuestionarioRespondido( caso ) {

    console.log( "visualizarQuestionarioRespondido - Início" );

    // Respostas do questionario
    let idsRespostasQuestionarios = caso.ids_respostas_questionarios;

    //DEBUG
    if( idsRespostasQuestionarios != "" ) {
      console.log( JSON.stringify(idsRespostasQuestionarios) );
    } else {
      console.log( "RESPOSTA NULA" );
    }

    // Obtém as divs do questionário
    let div_q1 = document.getElementById("acompanhamento_beneficiario");
    let div_q2 = document.getElementById("etapa_acesso");
    let div_q3 = document.getElementById("impossibilidade_temporaria");
    let div_q4 = document.getElementById("nao_acesso_definitivo");
    let div_q5 = document.getElementById("acompanhamento_nao");
    let div_observacoes = document.getElementById("observacoes"); 


    // Exibe apenas as questoes respondidas

    if( idsRespostasQuestionarios.q1 != "" ) {
      div_q1.style.display  =  "";
      document.getElementById("radio_acompanhamento_beneficiario" + idsRespostasQuestionarios.q1 ).checked = true;
      document.getElementsByName("radio_acompanhamento_beneficiario").forEach( opcao => {opcao.disabled = true;} );
    } else {
      div_q1.style.display  =  "none";
    }

    if( idsRespostasQuestionarios.q2 != "" ) {
      div_q2.style.display  =  "";
      document.getElementById("radio_etapa_acesso" + idsRespostasQuestionarios.q2 ).checked = true;
      document.getElementsByName("radio_etapa_acesso").forEach( opcao => {opcao.disabled = true;} );
    } else {
      div_q2.style.display  =  "none";
    }    

    if( idsRespostasQuestionarios.q3 != "" ) {
      div_q3.style.display  =  "";
      document.getElementById("radio_impossibilidade_temporaria" + idsRespostasQuestionarios.q3 ).checked = true;
      document.getElementsByName("radio_impossibilidade_temporaria").forEach( opcao => {opcao.disabled = true;} );
    } else {
      div_q3.style.display  =  "none";
    }        

    if( idsRespostasQuestionarios.q4 != "" ) {
      div_q4.style.display  =  "";
      document.getElementById("radio_nao_acesso_definitivo" + idsRespostasQuestionarios.q4 ).checked = true;
      document.getElementsByName("radio_nao_acesso_definitivo").forEach( opcao => {opcao.disabled = true;} );
    } else {
      div_q4.style.display  =  "none";
    }        

    if( idsRespostasQuestionarios.q5 != "" ) {
      div_q5.style.display  =  "";
      document.getElementById("radio_acompanhamento_nao" + idsRespostasQuestionarios.q5 ).checked = true;
      document.getElementsByName("radio_acompanhamento_nao").forEach( opcao => {opcao.disabled = true;} );
    } else {
      div_q5.style.display  =  "none";
    }        

    div_observacoes.style.display  =  "";
    document.getElementById("campo_observacoes").value = idsRespostasQuestionarios.observacoes;
    document.getElementById("campo_observacoes").disabled = true; 

    console.log( "visualizarQuestionarioRespondido - Fim" );

  } // Fim da função visualizarQuestionarioRespondido

  

  /**
   * Handler do botão Responder Questionário. Mostra o questionário e esconde o botão
   */
  function handlerBotaoResponderQuestionario() {
    document.getElementById("questionario_conteudo").style.display    =  "";    
    document.getElementById("btResponserQuestionario").style.display  =  "none";    

    document.getElementById("etapa_acesso").style.display                =  "none";   
    document.getElementById("acompanhamento_nao").style.display          =  "none";   
    document.getElementById("impossibilidade_temporaria").style.display  =  "none";                   
    document.getElementById("nao_acesso_definitivo").style.display       =  "none";                  
    document.getElementById("observacoes").style.display                 =  "none";      

  } // Fim da função handlerBotaoResponderQuestionario 



  /**
   * Mostra e esconde campos em função da opção selecionada no campo radio_acompanhamento_beneficiario
   */   
  function handlerChangeRadio_acompanhamento_beneficiario() {

    const valorRadio = document.querySelector('input[name="radio_acompanhamento_beneficiario"]:checked').value;            

    switch( valorRadio ) {

      case "1": // NÃO

                // Esconde campos referentes à opção SIM
                document.getElementById("etapa_acesso").style.display  =  "none";                  
                document.getElementsByName("radio_etapa_acesso").forEach( opcao => {opcao.checked = false;} );

                document.getElementById("impossibilidade_temporaria").style.display  =  "none";                  
                document.getElementsByName("radio_impossibilidade_temporaria").forEach( opcao => {opcao.checked = false;} );                

                document.getElementById("nao_acesso_definitivo").style.display  =  "none";                  
                document.getElementsByName("radio_nao_acesso_definitivo").forEach( opcao => {opcao.checked = false;} );                

                // Mostra campo referente à opção NÃO
                document.getElementById("acompanhamento_nao").style.display  =  "";                   

                break; 

      case "2": // SIM
       
                if( cache_CasoEmVisualizacao.id_situacao_beneficio == 3 ) {

                  // Mostra campos referentes à opção SIM
                  document.getElementById("etapa_acesso").style.display  =  "";                   
  
                  // Esconde campo referente à opção Não
                  document.getElementById("acompanhamento_nao").style.display  =  "none";                  
                  document.getElementsByName("radio_acompanhamento_nao").forEach( opcao => {opcao.checked = false;} );                  
                }
       
                break;
    }

    document.getElementById("observacoes").style.display  =  "";   

    document.getElementById("observacoes").focus();

  } // Fim da função handlerChangeRadio_acompanhamento_beneficiario



  /**
   * Mostra e esconde campos em função da opção selecionada no campo radio_etapa_acesso
   */     
  function handlerChangeRadio_etapa_acesso() {

    const valorRadio = document.querySelector('input[name="radio_etapa_acesso"]:checked').value;            

    switch( valorRadio ) {

      case "5": // O beneficiário está impossibilitado de acessar temporariamente

                // Mostra campo referente à impossibilidade
                document.getElementById("impossibilidade_temporaria").style.display  =  "";                   

                // Esconde campo referente ao não acesso definitivo
                document.getElementById("nao_acesso_definitivo").style.display  =  "none";                  
                document.getElementsByName("radio_nao_acesso_definitivo").forEach( opcao => {opcao.checked = false;} );

                break; 

      case "6": // O beneficiário não acessará o benefício de forma definitiva

                // Esconde campo referente à impossibilidade
                document.getElementById("impossibilidade_temporaria").style.display  =  "none";                   
                document.getElementsByName("radio_impossibilidade_temporaria").forEach( opcao => {opcao.checked = false;} );

                // Mostra campo referente ao não acesso definitivo
                document.getElementById("nao_acesso_definitivo").style.display  =  "";                                  
       
                break;

      default:  // Outras opções                

                // Esconde campo referente à impossibilidade
                document.getElementById("impossibilidade_temporaria").style.display  =  "none";                   
                document.getElementsByName("radio_impossibilidade_temporaria").forEach( opcao => {opcao.checked = false;} );      

                // Esconde campo referente ao não acesso definitivo
                document.getElementById("nao_acesso_definitivo").style.display  =  "none";                  
                document.getElementsByName("radio_nao_acesso_definitivo").forEach( opcao => {opcao.checked = false;} );
                
                break;
    }

    document.getElementById("observacoes").focus();

  } // Fim da função handlerChangeRadio_etapa_acesso



  /**
   * Handler do botão Salvar Questionário. Coleta as respostas do questionário e 
   * chama a função frontend para salvar o questionário
   */     
  function handlerBotaoSalvarQuestionario() {
    
    const q1 = document.querySelector('input[name="radio_acompanhamento_beneficiario"]:checked') ?
               document.querySelector('input[name="radio_acompanhamento_beneficiario"]:checked').value :
               "";

    if(q1 == "") {

      // Exibe modal de erro caso a primeira questão do questionário esteja vazia
      mostrarModalErro( "A primeira questão do questionário é obrigatória!" );                            

    } else {

      const q2 = document.querySelector('input[name="radio_etapa_acesso"]:checked') ? 
                 document.querySelector('input[name="radio_etapa_acesso"]:checked').value : 
                 "";
  
      const q3 = document.querySelector('input[name="radio_impossibilidade_temporaria"]:checked') ? 
                 document.querySelector('input[name="radio_impossibilidade_temporaria"]:checked').value : 
                 "";               
  
      const q4 = document.querySelector('input[name="radio_nao_acesso_definitivo"]:checked') ? 
                 document.querySelector('input[name="radio_nao_acesso_definitivo"]:checked').value : 
                 "";               
  
      const q5 = document.querySelector('input[name="radio_acompanhamento_nao"]:checked') ? 
                 document.querySelector('input[name="radio_acompanhamento_nao"]:checked').value : 
                 "";      
                 
      const observacoes = document.getElementById("campo_observacoes").value;
  
      const respostasQuestionario = {
        "idCaso" : id_CasoEmVisualizacao,
        "q1" : q1,
        "q2" : q2,
        "q3" : q3,
        "q4" : q4,
        "q5" : q5,
        "observacoes" : observacoes
      };
      
      salvarQuestionarioFE( respostasQuestionario )

    }// Fim else

  } // Fim da função handlerBotaoSalvarQuestionario



  /**
   * Função que localiza os questionários pendentes de uma instituição
   */
  function localizarQuestionariosPendentes( idInstituicao ) {

    // Localiza os casos pendentes na tabela casos
    let casosPendentes = cache_TabelaCasos.filter( caso => {
      if( caso.id_orgao_encaminhador == idInstituicao && caso.id_situacao_questionario == "2" ) {
        return true;
      } else {
        return false;
      }
    });

    return casosPendentes;

  } // Fim da função localizarQuestionariosPendentes



  /**
   * Função que mostra o caso com questionário pendente clicado
   */
  function mostrarQuestionario( idCaso ) {

    // Esconde modal de questionários pendentes
    modalQuestionariosPendentes.hide();      

    // Obtém o id do caso 
    id_CasoEmVisualizacao = idCaso;

    // Exibe a página de visualização    
    exibirPagina('visualizarCaso');      

  } //  Fim da função mostrarQuestionario

     });

     console.log( "teste_localizarQuestionariosPendentes - FIM" );
  }


</script>
