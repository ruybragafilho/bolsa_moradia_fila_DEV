<script>

  "use strict";

  // Cache do caso que está sendo visualizado
  let id_CasoEmVisualizacao;  
  let cache_CasoEmVisualizacao;  


  /**
   * Função que configura a página de visualização de caso
   */
  function configurarPaginaVisualizarCaso() {

    // Não mostra os campos referentes à data limite por padrão. Mostra apenas para 
    // situação == Convocado para Acesso E para técnicas da DPOP
    document.getElementById("data_limite_edicao").style.display   =  "none";

    // Não mostra os campos referentes às vistorias por padrão. Mostra apenas para 
    // técnicas da DPOP    
    document.getElementById("headerVistoriasDoCaso").style.display  =  "none";    
    document.getElementById("vistoriasDoCaso").style.display        =  "none";    
    document.getElementById("vistoria_traco_inicio").style.display  =  "none";   
    document.getElementById("vistoria_traco_fim").style.display     =  "none";   
    
  } // Fim da função configurarPaginaVisualizarCaso



  /**
   * Função chamada quando o usuário clica em um caso, na tela de resumos dos casos
   */    
  function visualizarCaso() {

    // Localiza o caso na tabela dados
    let indiceCasoNaTabelaResumo;
    let numCasos = cache_TabelaCasos.length;
    for( indiceCasoNaTabelaResumo=0; indiceCasoNaTabelaResumo<numCasos; ++indiceCasoNaTabelaResumo  ) {
      if(cache_TabelaCasos[indiceCasoNaTabelaResumo].id == id_CasoEmVisualizacao) {
        cache_CasoEmVisualizacao = cache_TabelaCasos[ indiceCasoNaTabelaResumo ];
        break;
      }
    }    

    // Mostra os parâmetros do caso apenas para os trabalhadores
    // do órgão que encaminhou o cidadão
    if( cache_CasoEmVisualizacao.id_orgao_encaminhador == usuarioLogado.instituicao ||
        usuarioLogado.instituicao == "0" ) {

      // Exibe os dados na página de visualização de caso
      document.getElementById( "nome_referenciaFamiliarInput" ).value = cache_CasoEmVisualizacao.referencia_familiar;
      document.getElementById( "cpf_referenciaFamiliarInput" ).value  = cache_CasoEmVisualizacao.cpf_rf;
      document.getElementById( "situacaoBeneficioInput" ).value  = idToNomeFE( cache_CasoEmVisualizacao.id_situacao_beneficio, "SITUACOES_BENEFICIO" );
        
      // Mostra os campos referentes à data limite
      // apenas para situação == Convocado para Acesso
      // e apenas para trabalhadores técnicas da DPOP
      if( cache_CasoEmVisualizacao.id_situacao_beneficio == "3" && 
          usuarioLogado.instituicao == "0") {

        visualizarDataLimite( cache_CasoEmVisualizacao );

      }

      // Mostra a situação do questionário
      visualizarSituacaoQuestionario( cache_CasoEmVisualizacao );
      
      // Mostra os parâmetros do caso
      visualizarParametroCaso( cache_CasoEmVisualizacao );
  
      // Mostra pontuação total do caso
      document.getElementById('totalizacaoParametrosDoCaso').innerHTML = `PONTUAÇÃO DO CASO: ${cache_CasoEmVisualizacao.pontuacao}`;

      // Mostra as vistorias do caso
      if( usuarioLogado.instituicao == "0") {      
        visualizarVistoriasCaso( cache_CasoEmVisualizacao )
      }

    } else {
      // Exibe modal de erro caso o tipo de evolução não tenha sido selecionado
      mostrarModalErro( "Informações disponíveis apenas para a entidade que encaminhou esse cidadão!" );   
      redirecionarParaTelaResumosDosCasos( 0 );                   
    }

  } // Fim da função visualizarCaso

  

  /**
   * Função que mostra a data limite
   */    
  function visualizarDataLimite( caso ) {

    // Obtém os elementos dataLimite e justificatida da página
    let dataLimite = document.getElementById("data_limite_edicao_input");
    let justificativa = document.getElementById("justificativaAlteracaoDataLimite");

    // Ajusta o display dos elementos para que eles sejam exibidos 
    document.getElementById("data_limite_edicao").style.display   =  "";
    dataLimite.style.display     =  "";
    justificativa.style.display  =  "";    

    // Exibe a data limite
    if(caso.data_limite != "") {
      let data = caso.data_limite.split("/");
      dataLimite.value = `${data[2]}-${data[1]}-${data[0]}`;
    }
    
    // Exibe a justificativa para alteração da data limite
    justificativa.value = caso.justificativa_alteracao_data_limite;

  } // Fim da função visualizarDataLimite



  /**
   * Função que renderiza uma tabela com os parâmetros do caso
   */    
  function visualizarParametroCaso( caso ) {

    if( caso.ids_parametros_caso == "" ) {
      console.log( "visualizarParametroCaso - Parametro nulo" );
      return "";
    }

    // Parâmetros do caso
    let nomes_parametros      = caso.ids_parametros_caso.map( id => cache_TabelaParametros[ parseInt(id)-1][COLUNA_NOME] );
    let pesos_parametros      = caso.ids_parametros_caso.map( id => cache_TabelaParametros[ parseInt(id)-1][COLUNA_PESO_PARAMETRO] );
    let pontuacoes_parametros = caso.ids_parametros_caso.map( id => cache_TabelaParametros[ parseInt(id)-1][COLUNA_PONTUACAO_PARAMETRO] );
    let num_parametros        = caso.ids_parametros_caso.length;

    let pontuacoes_caso = caso.pontuacoes_parametros_caso;


    // Seleciona o corpo da tabela onde os dados serão inseridos    
    const tbody = document.getElementById("conteudoParametrosDoCaso");

    // Limpa o conteúdo da tabela
    tbody.innerHTML = ''; 


    // Para cada parametro do caso, cria uma linha na tabela    
    for( let p=0; p<num_parametros; ++p ) {

      // Cria uma linha da tabela
      const tr = document.createElement('tr');

      // Preenche a linha com as células contendo os dados e o select de desiginação
      tr.innerHTML =           
       `<td class="align-middle">${nomes_parametros[p]}</td>
        <td class="align-middle">${pesos_parametros[p]}</td>
        <td class="align-middle">${pontuacoes_parametros[p]}</td>
        <td class="align-middle">${pontuacoes_caso[p]}</td>`;   
      
      // Adiciona a linha na tabela
      tbody.appendChild(tr);

    } // Fim do for
    
  } // Fim da função visualizarParametroCaso



  /**
   * Função que renderiza uma tabela com as vistorias do caso
   */    
  function visualizarVistoriasCaso( caso ) {

    document.getElementById("headerVistoriasDoCaso").style.display  =  "";    
    document.getElementById("vistoriasDoCaso").style.display        =  "";   
    document.getElementById("vistoria_traco_inicio").style.display  =  "";   
    document.getElementById("vistoria_traco_fim").style.display     =  "";   

    if( caso.vistorias.length < 1 ) {
      console.log( "visualizarVistoriasCaso - Sem Vistorias" );
      return "";
    }

    // Seleciona o corpo da tabela onde os dados serão inseridos    
    const tbody = document.getElementById("conteudoVistoriasDoCaso");

    // Limpa o conteúdo da tabela
    tbody.innerHTML = ''; 
  
    // Para cada vistoria do caso, cria uma linha na tabela    
    caso.vistorias.forEach( v => {

      // Cria uma linha da tabela
      const tr = document.createElement('tr');

      // Preenche a linha com as células contendo os dados e o select de desiginação
      tr.innerHTML =           
       `<td class="align-middle">${v.dataSolicitacao}</td>
        <td class="align-middle">${v.dataVistoria}</td>
        <td class="align-middle">${v.dataLaudo}</td>
        <td class="align-middle">${v.descricaoLaudo}</td>
        <td class="align-middle">${v.informacaoComplementar}</td>`;   
      
      // Adiciona a linha na tabela
      tbody.appendChild(tr);

    }); // Fim do forEach

  } // Fim da função visualizarVistoriasCaso



  </script>
