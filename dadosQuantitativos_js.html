/**
 * Módulo:    dadosQuantitativos_js.html
 * Objetivo:  Módulo com funções que obtêm os dados quantitativos e gera seus gráficos
 */

  "use strict";  

  // Arrays para armazenar os valores X e Y do gráfico Situação do Benefício
  let quantitativoSituacaoBeneficio;
  let labelSituacaoBeneficio = [];

  // Arrays para armazenar os valores X e Y do gráfico Situação da Vistoria
  let quantitativoSituacaoVistoria;
  let labelSituacaoVistoria = [];

  // Arrays para armazenar os valores X e Y do gráfico Perfis
  let quantitativoPerfis;
  let labelPerfis = [];

  // Arrays para armazenar os valores X e Y do gráfico Perfis de Identidades de Gênero
  let quantitativoPerfisGenero;
  let labelPerfisGenero = [];  

  // Arrays para armazenar os valores X e Y do gráfico Perfis de Orientações Sexuais
  let quantitativoPerfisOrientacaoSexual;
  let labelPerfisOrientacaoSexual = [];  


  /**
   * Função que contabiliza a quantidade de casos em cada situação (Situação do Benefício)
   */
  async function gerarQuantitativoSituacaoBeneficio() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {      
      await esperar( 1000 );
    }            

    // Inicializa os contadores de cada situação de benefício
    quantitativoSituacaoBeneficio =  new Array( numSituacoesBeneficio ).fill( 0 );

    // Contabiliza a quantidade de casos em cada situação de benefício
    casosFiltrados.forEach( caso => {        
        ++(quantitativoSituacaoBeneficio[ parseInt(caso.id_situacao_beneficio) - 1 ]);
    })    

  } // Fim da função gerarQuantitativoSituacaoBeneficio



  /**
   * Função que gera o gráfico de barras da quantidade de casos em cada situação (Situação do Benefício)
   */
  async function gerarGraficoQuantitativoSituacaoBeneficio() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {
      await esperar( 1000 );
    }            

    // Chama a função para gerar o quantitativo de casos em cada situação
    gerarQuantitativoSituacaoBeneficio();

    // Gera os Labels do gráfico com os nomes das situações de benefício
    cache_TabelaSituacoesBeneficio.forEach( sit_beneficio => {
      labelSituacaoBeneficio.push( sit_beneficio[COLUNA_NOME] );  
    });

    // Gera o gráfico usando a biblioteca plotly.js
    const grafico = document.getElementById( "plotQuantitativoSituacaoBeneficio" );    
    
    const data = [{
      x:labelSituacaoBeneficio,
      y:quantitativoSituacaoBeneficio,
      type:"bar",      
      textposition: 'auto',
      orientation:"v",
      marker: {color:"rgba(0,0,255,0.6)"},
      text: quantitativoSituacaoBeneficio.map(String),
      hovertemplate: '%{x}: %{y}<br>' +                     
                     '<extra></extra>' // Hides the trace name box                     
    }];
    
    const layout = {
      title: { text: "<b>Situações Benefícios</b>" },            
      height: 500, // Altura total  
      xaxis: {
        tickangle: -45,
        automargin: true
      }      
    };

    const config = {
      responsive: true,
      displayModeBar: false
    };      
    
    Plotly.newPlot(grafico, data, layout, config);

  } // Fim da função gerarGraficoQuantitativoSituacaoBeneficio 
  


  /**
   * Função que contabiliza a quantidade de casos em cada situação (Situação da Vistoria)
   */
  async function gerarQuantitativoSituacaoVistoria() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {      
      await esperar( 1000 );
    }            

    // Inicializa os contadores de cada situação de benefício
    quantitativoSituacaoVistoria =  new Array( numSituacoesVistoria + 1 ).fill( 0 );

    // Contabiliza a quantidade de casos em cada situação de benefício
    casosFiltrados.forEach( caso => {        

      if( caso.id_situacao_vistoria != "" ) {
        ++(quantitativoSituacaoVistoria[ parseInt(caso.id_situacao_vistoria) - 1 ]);
      } else {
        ++(quantitativoSituacaoVistoria[ quantitativoSituacaoVistoria.length - 1 ]);
      }        

    })    

  } // Fim da função gerarQuantitativoSituacaoVistoria



/**

   */

    // Gera os Labels do gráfico com os nomes das situações de vistoria
    cache_TabelaSituacoesVistoria.forEach( sit_vistoria => {

    });
    labelSituacaoVistoria.push( "SEM VISTORIA AGENDADA" );

    // Gera o gráfico usando a biblioteca plotly.js
    const grafico = document.getElementById( "plotQuantitativoSituacaoVistoria" );    
    
    const data = [{
      x:labelSituacaoVistoria,

      marker: {color:"rgba(0,0,255,0.6)"},
      text: quantitativoSituacaoVistoria.map(String),
      hovertemplate: '%{x}: %{y}<br>' +                     
                     '<extra></extra>' // Hides the trace name box                     
    }];
    
    const layout = {
      title: { text: "<b>Situações Vistorias</b>" },      
      height: 500, // Altura total  
      xaxis: {
        tickangle: -45,
        automargin: true
      }      
    };

    const config = {
      responsive: true,
      displayModeBar: false
    };      
    
    Plotly.newPlot(grafico, data, layout, config);

  } // Fim da função gerarGraficoQuantitativoSituacaoVistoria 
  


  /**
   * Função que contabiliza a quantidade de características dos casos
   */
  async function gerarQuantitativoPerfis() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {      
      await esperar( 1000 );
    }            

    // Inicializa os contadores de cada Perfil
    quantitativoPerfis =  new Array( numPerfis ).fill( 0 );

    let perfilCaso = [];

    // Contabiliza a quantidade de casos em cada Perfil
    casosFiltrados.forEach( caso => {        

      perfilCaso = caso.ids_perfil.split(";");

      for( let i=0; i<numPerfis; ++i)  {
        quantitativoPerfis[i] += parseInt( perfilCaso[i] );
      }

    })    

  } // Fim da função gerarQuantitativoPerfis



  /**
   * Função que gera o gráfico de barras da quantidade características dos casos
   */
  async function gerarGraficoQuantitativoPerfis() {

    // Aguarda carregamento das tabelas na cache de tabelas
    while( !tabelasCarregadasNaCache() ) {
      await esperar( 1000 );
    }            

    // Chama a função para gerar o quantitativo de casos em cada perfil
    gerarQuantitativoPerfis();

    // Gera os Labels do gráfico com os nomes dos perfis
    cache_TabelaPerfis.forEach( perfil => {
      labelPerfis.push( perfil[COLUNA_NOME] );  
    });

    // Gera o gráfico usando a biblioteca plotly.js
    const grafico = document.getElementById( "plotQuantitativoPerfis" );    

    const quantitativoPerfisReversed = quantitativoPerfis.toReversed();
    const labelPerfisReversed = labelPerfis.toReversed();
    
    const data = [{
      x:quantitativoPerfisReversed,
      y:labelPerfisReversed,
      type:"bar",      
      textposition: 'auto',
      orientation:"h",
      marker: {color:"rgba(0,0,255,0.6)"},
      text: quantitativoPerfisReversed.map(String),
      hovertemplate: '%{x}: %{y}<br>' +                     
                     '<extra></extra>' // Hides the trace name box                     
    }];
    
    const layout = {
      title: { text: "<b>Perfil Parâmetros dos Cidadãos</b>" },            
      height: 900, // Altura total  
      xaxis: {
        automargin: true
      },      
      yaxis: {
//        tickangle: -45,        
        automargin: true
      }
    };

    const config = {
      responsive: true,
      displayModeBar: false
    };      
    
    Plotly.newPlot(grafico, data, layout, config);

  } // Fim da função gerarGraficoQuantitativoPerfis
