<script>

  "use strict";

  // Variável para controlar a exibição de janelas modais de mensagens
  let conteudoModalMensagem;
  let modalMensagem;

  // Variáveis para controlar a exibição da janela modal de erro
  let conteudoModalErro;  
  let modalErro;

  // Variáveis para controlar a exibição da janela modal de questionários pendentes
  let conteudoModalQuestionariosPendentes;  
  let modalQuestionariosPendentes;


  /**
  * Função que inicializa as telas modais utilizadas no frontend
  */  
  function inicializarModais() {

    // Instancia as variáveis para controlar a exibição da janela modal de mensagem
    conteudoModalMensagem = document.getElementById("conteudoModalMensagem");
    modalMensagem = new bootstrap.Modal( document.getElementById("modalMensagem" ), {
      backdrop: 'static',
      keyboard: false
    });


    // Instancia as variáveis para controlar a exibição da janela modal de erro
    conteudoModalErro = document.getElementById("conteudoModalErro");  
    modalErro = new bootstrap.Modal( document.getElementById("modalErro") );


    // Instancia as variáveis para controlar a exibição da janela modal de questionário
    conteudoModalQuestionariosPendentes = document.getElementById("conteudoModalQuestionariosPendentes");  
    modalQuestionariosPendentes = new bootstrap.Modal( document.getElementById("modalQuestionariosPendentes") );    

  } // Fim da função inicializarModais

  
  /**
   * Função frontend que mostra o modal de mensagem
   *  
   * @param {String} mensagem: A mensagem que será mostrada no modal de mensagem 
   */  
  function mostrarModalMensagem( mensagem ) {

    // Mostra modal de mensagem
    conteudoModalMensagem.textContent = mensagem;
    modalMensagem.show();

  } // Fim da função modalErro

  
  /**
   * Função frontend que mostra o modal de erro
   *  
   * @param {String} mensagemErro: A mensagem que será mostrada no modal de erro 
   */  
  function mostrarModalErro( mensagemErro ) {

    // Esconde modal de mensagem, caso alguma esteja visível
    modalMensagem.hide();

    // Mostra modal de erro
    conteudoModalErro.textContent = mensagemErro;
    modalErro.show();

  } // Fim da função modalErro


  /**
   * Função frontend que mostra o modal de questionários pendentes
   */
  function mostrarModalQuestionariosPendentes() {
  
      // Esconde modal de mensagem, caso alguma esteja visível
      modalMensagem.hide();

      // Reset do modal de questionários pendentes
      conteudoModalQuestionariosPendentes.innerHTML = "";      

      // Obtém os casos com questionários pendentes associados à instituição do usuário logado no sistema
      let questionariosPendentes = localizarQuestionariosPendentes( usuarioLogado.instituicao );

      // Se houver casos pendentes, mostra o modal de questionário
      if ( questionariosPendentes.length > 0 ) {
  
        conteudoModalQuestionariosPendentes.innerHTML += "<br>";
        questionariosPendentes.forEach( element => {

          // Popula o modal com os casos
          conteudoModalQuestionariosPendentes.innerHTML += `<div class="bg-light border rounded-2" role="button" onclick="mostrarQuestionario(${element.id})">RF: ${element.referencia_familiar}<br>CPF: ${element.cpf_rf}</div><br>`;          
        });
  
        // Mostra modal de questionários pendentes
        modalQuestionariosPendentes.show();      
        
      }
  
    } // Fim da função mostrarModalQuestionario

  

</script>
