<!-- Tela Visualização de Caso - Início -->


  <!-- Nav - Botão Superior Fechar - Início -->
  <nav class="navbar bg-body-tertiary mt-1">
    <div class="container-fluid justify-content-start">
      <button id="botaoFecharCasoSuperior" class="btn btn-sm btn-outline-secondary me-4" type="button" onclick="redirecionarParaTelaResumosDosCasos( 0 )">FECHAR</button>
    </div>
  </nav>
  <!-- Nav - Botão Superior Fechar - Fim -->




  <!-- Main - Parte principal da tela de Visualização de Caso - Início -->
  <main id="telaVisualizacaoCasos" class="container">     

    <!-- Cabeçalho -->
    <section class="row">    
      <h3 class="text-center fw-bold mt-4 mb-4" id="tituloPagina">BOLSA MORADIA - POP RUA</h3>         
      <h4 class="text-center fw-bold mb-5" id="subtituloPagina">Visualização do Caso</h4>                  
    </section>

    <br><hr><br>          

    <!-- Dados do Caso - Início -->
    <section class="row mb-5">  
      <div class="col-md-4">
        <label for="nome_referenciaFamiliarInput" class="form-label fw-bold">NOME REFERÊNCIA FAMILIAR</label>
        <input type="text" class="form-control" id="nome_referenciaFamiliarInput" disabled>
      </div>

      <div class="col-md-1"></div>
      <div class="col-md-3">
        <label for="cpf_referenciaFamiliarInput" class="form-label fw-bold">CPF REFERÊNCIA FAMILIAR</label>
        <input type="text" class="form-control" id="cpf_referenciaFamiliarInput" disabled>
      </div>            

      <div class="col-md-1"></div>
      <div class="col-md-3">
        <label for="situacaoBeneficioInput" class="form-label fw-bold">SITUAÇÃO BENEFÍCIO</label>
        <input type="text" class="form-control" id="situacaoBeneficioInput" disabled>
      </div>      
    </section>  
    <!-- Dados do Caso - Fim -->
    

    <!-- Data limite - Início -->
    <section id="data_limite_edicao" >  

      <div class="row mb-5">
        <div class="col-md-1"></div>      
        <div class="col-md-2"> 
          <label for="data_limite_edicao_input" class="form-label fw-bold" id="data_limite_label">DATA LIMITE</label>
          <input type="date" class="form-control form-control-sm" id="data_limite_edicao_input">        
        </div>
  
        <div class="col-md-1"></div>
  
        <div class="col-md-7">
          <label for="justificativaAlteracaoDataLimite" class="form-label fw-bold">JUSTIFICATIVA ALTERAÇÃO DATA LIMITE</label>
          <textarea class="form-control" id="justificativaAlteracaoDataLimite" rows="3" maxlength="1000"></textarea>
        </div>            
        <div class="col-md-1"></div>              
      </div>

      <div class="row mb-2">
        <div class="col-md-5"></div>
        <div class="col-md-3">
          <button class="btn btn-sm btn-primary" id="bt_alterarDataLimite" onclick="alterarDataLimiteFE()">Gravar Nova Data Limite</button>              
        </div>        
        <div class="col-md-4"></div>
      </div>  

    </section>  
    <!-- Data limite - Fim -->

    
    <br><br>


    <!-- Tabela com Parâmetros + Pontuação do caso - Início -->    
    <section class="mt-5 mb-4">

      <h5 class="text-center mt-5 mb-5" id="headerParametrosDoCaso">PARÂMETROS DO CASO</h5><br>    

      <hr><h6 class="text-center mt-2 mb-2" id="totalizacaoParametrosDoCaso"></h6><hr><br>   

      <table class="table table-striped table-hover text-center" id="parametrosDoCaso">    

        <thead>
          <tr>                            
            <th scope="col" class="align-middle">CRITÉRIO DE PRIORIZAÇÃO</th>
            <th scope="col" class="align-middle">PESO DO CRITÉRIO</th>
            <th scope="col" class="align-middle">PONTUAÇÃO DO CRITÉRIO</th>
            <th scope="col" class="align-middle">PONTUAÇÃO DO CRITÉRIO NO CASO</th>
          </tr>
        </thead>
      
        <tbody class="table-group-divider" id="conteudoParametrosDoCaso">                
        </tbody>    

      </table>

    </section>  
    <!-- Tabela com Parâmetros + Pontuação do caso - Fim -->    


    <br><hr><br>        
    

    <!-- Tabela com dados das vistorias do caso - Início -->    
    <section class="mt-4 mb-4">

      <h5 class="text-center mt-5 mb-4" id="headerVistoriasDoCaso">VISTORIAS</h5><hr>    

      <table class="table table-striped table-hover text-center mt-1" id="vistoriasDoCaso">    

        <thead>
          <tr>                            
            <th scope="col" class="align-middle">DATA SOLICITAÇÃO</th>
            <th scope="col" class="align-middle">DATA VISTORIA</th>
            <th scope="col" class="align-middle">DATA LAUDO</th>
            <th scope="col" class="align-middle">DESCRIÇÃO LAUDO</th>
            <th scope="col" class="align-middle">INFORMAÇÃO COMPLEMENTAR</th>
          </tr>
        </thead>
      
        <tbody class="table-group-divider" id="conteudoVistoriasDoCaso">                
        </tbody>    

      </table>
      
    </section>  
    <!-- Tabela com dados das vistorias do caso - Fim -->    

    <br><hr><br>            

  </main> 
  <!-- Main - Parte principal da tela Visualização de Caso - Fim -->


  <!-- Nav - Botão Inferior Fechar - Início -->
  <nav class="navbar bg-body-tertiary mt-5 mb-1">
    <div class="container-fluid justify-content-start">         
      <button id="botaoFecharCasoInferior" class="btn btn-sm btn-outline-secondary me-4" type="button" onclick="redirecionarParaTelaResumosDosCasos( 0 )">FECHAR</button>
    </div>
  </nav>
  <!-- Nav - Botão Inferior Fechar - Fim -->


<!-- Tela Visualização de Caso - Fim -->
